<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration</title>
    <style>
       
        body {
            background-color: #003366; 
            color: #ffffff;
            font-family: 'Tahoma', sans-serif;
            text-align: center;
            padding: 50px;
        }

        h2 {
            color: #00d4ff;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        .form-container {
            background-color: #002244;
            display: inline-block;
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #00d4ff;
            box-shadow: 0px 0px 20px rgba(0, 212, 255, 0.3);
            text-align: left;
        }

       
        label {
            display: block;
            font-style: italic;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 8px;
            color: #a0c4ff;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 25px;
            border: 1px solid #00d4ff;
            background-color: #001a33;
            color: white;
            border-radius: 5px;
            box-sizing: border-box; 
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 10px #00d4ff;
        }

        
        #submitBtn {
            width: 100%;
            background-color: #00d4ff;
            color: #001f3f;
            border: none;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        #submitBtn:hover {
            background-color: #ffffff;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <h2>Student Registration</h2>

    <div class="form-container">
        <form id="registrationForm">
            <label for="name">FULL NAME</label>
            <input type="text" id="name" required>

            <label for="studentNum">STUDENT NUMBER</label>
            <input type="text" id="studentNum" required>

            <label for="phone">TELEPHONE NUMBER</label>
            <input type="tel" id="phone" required>

            <label for="email">EMAIL ADDRESS</label>
            <input type="email" id="email" required>

            <button type="submit" id="submitBtn">Register Student</button>
        </form>
    </div>

    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            event.preventDefault(); 

        
            const studentName = document.getElementById('name').value;

           
            alert("Registration Successful!\nWelcome to the system, " + studentName + ".");
            
            
            console.log("Form Submitted Successfully.");
        });
    </script>

</body>
</html>
